# /etc/nginx/sites-available/tenderwatch
# TenderWatch API – Nginx reverse proxy with TLS
# Symlink: ln -s /etc/nginx/sites-available/tenderwatch /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name api.tenderw.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.tenderw.com;

    # TLS (managed by Certbot – will auto-fill these lines)
    ssl_certificate     /etc/letsencrypt/live/api.tenderw.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.tenderw.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # CORS preflight – handled by FastAPI, just pass through
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow large PDF uploads (up to 20 MB)
        client_max_body_size 20M;

        # Scraper runs can take a while
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
